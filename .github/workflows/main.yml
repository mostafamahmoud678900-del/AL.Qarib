name: Android Build (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  FLUTTER_VERSION: 3.41.4

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 📥 تحميل الكود
      # ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 🐍 Python
      # ─────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ─────────────────────────────────────────
      # 🟦 Flutter
      # ─────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # ─────────────────────────────────────────
      # ☕ Java 17 (الأنسب لـ Android Gradle حالياً)
      # ─────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ─────────────────────────────────────────
      # 📜 قبول رخص Android SDK
      # ─────────────────────────────────────────
      - name: Accept Android Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ─────────────────────────────────────────
      # 🔐 فك تشفير الـ Keystore
      # ─────────────────────────────────────────
      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/alqarib.jks

      # ─────────────────────────────────────────
      # 🛠️ Build APK — مع التوقيع الكامل
      # ─────────────────────────────────────────
      - name: Build APK (Release + Signed)
        run: |
          flutter config --no-analytics
          flet build apk \
            --build-number=${{ env.BUILD_NUMBER }} \
            --build-version=${{ env.BUILD_VERSION }} \
            --android-signing-key-store=android/app/alqarib.jks \
            --android-signing-key-store-password=${{ secrets.KEY_STORE_PASSWORD }} \
            --android-signing-key-alias=${{ secrets.KEY_ALIAS }} \
            --android-signing-key-password=${{ secrets.KEY_PASSWORD }}

      # ─────────────────────────────────────────
      # 📦 Build AAB — مع التوقيع الكامل
      # ─────────────────────────────────────────
      - name: Build AAB (Release + Signed)
        run: |
          flet build aab \
            --build-number=${{ env.BUILD_NUMBER }} \
            --build-version=${{ env.BUILD_VERSION }} \
            --android-signing-key-store=android/app/alqarib.jks \
            --android-signing-key-store-password=${{ secrets.KEY_STORE_PASSWORD }} \
            --android-signing-key-alias=${{ secrets.KEY_ALIAS }} \
            --android-signing-key-password=${{ secrets.KEY_PASSWORD }}

      # ─────────────────────────────────────────
      # ✅ التحقق من وجود الملفات
      # ─────────────────────────────────────────
      - name: List build outputs
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== AAB files ==="
          find . -name "*.aab" 2>/dev/null || echo "No AAB found"

      # ─────────────────────────────────────────
      # 📤 رفع APK
      # ─────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            build/apk/*.apk
            **/*.apk
          if-no-files-found: warn

      # ─────────────────────────────────────────
      # 📤 رفع AAB
      # ─────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: |
            build/aab/*.aab
            **/*.aab
          if-no-files-found: warn

      # ─────────────────────────────────────────
      # 🗑️ حذف الـ Keystore من الـ runner بعد البناء
      # ─────────────────────────────────────────
      - name: Cleanup Keystore
        if: always()
        run: rm -f android/app/alqarib.jks
