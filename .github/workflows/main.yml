name: Android Build (APK + AAB)

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  FLUTTER_VERSION: 3.41.4

jobs:

  build-apk:
    name: Build APK (split per ABI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 --decode > alqarib.jks

      - name: Flutter doctor
        run: flutter doctor

      - name: Build APK (split per ABI)
        run: |
          flutter config --no-analytics
          flet build apk \
            --build-number=$BUILD_NUMBER \
            --build-version=$BUILD_VERSION \
            --split-per-abi \
            --android-signing-key-store=alqarib.jks \
            --android-signing-key-store-password=${{ secrets.KEYSTORE_PASSWORD }} \
            --android-signing-key-alias=${{ secrets.KEY_ALIAS }} \
            --android-signing-key-password=${{ secrets.KEY_PASSWORD }} \
            --verbose

      - name: Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: apk-arm64-v8a
          path: build/apk/*arm64*.apk
          if-no-files-found: warn

      - name: Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: apk-armeabi-v7a
          path: build/apk/*armeabi*.apk
          if-no-files-found: warn

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: apk-x86_64
          path: build/apk/*x86_64*.apk
          if-no-files-found: warn

      - name: Upload all APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-all
          path: build/apk/
          if-no-files-found: warn


  build-aab:
    name: Build AAB (Google Play)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 --decode > alqarib.jks

      - name: Flutter doctor
        run: flutter doctor

      - name: Build AAB
        run: |
          flutter config --no-analytics
          flet build aab \
            --build-number=$BUILD_NUMBER \
            --build-version=$BUILD_VERSION \
            --android-signing-key-store=alqarib.jks \
            --android-signing-key-store-password=${{ secrets.KEYSTORE_PASSWORD }} \
            --android-signing-key-alias=${{ secrets.KEY_ALIAS }} \
            --android-signing-key-password=${{ secrets.KEY_PASSWORD }} \
            --verbose

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-release
          path: build/aab/
          if-no-files-found: warn
