name: Android Build (APK + AAB)

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  FLUTTER_VERSION: 3.41.4

jobs:

  # ════════════════════════════════════════════
  #  APK — للتثبيت المباشر على الهاتف
  #  ينتج 3 ملفات منفصلة (arm64 + arm32 + x86_64)
  #  أصغر حجماً وأسرع على الهاتف
  # ════════════════════════════════════════════
  build-apk:
    name: Build APK (split per ABI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Flutter doctor
        run: flutter doctor

      - name: Build APK (split per ABI)
        run: |
          flutter config --no-analytics
          flet build apk \
            --build-number=$BUILD_NUMBER \
            --build-version=$BUILD_VERSION \
            --split-per-abi \
            --verbose

      # ── رفع كل ملفات APK المنتجة ──────────────
      - name: Upload APK (arm64-v8a) — للهواتف الحديثة
        uses: actions/upload-artifact@v4
        with:
          name: apk-arm64-v8a
          path: build/apk/*arm64*.apk
          if-no-files-found: warn

      - name: Upload APK (armeabi-v7a) — للهواتف القديمة
        uses: actions/upload-artifact@v4
        with:
          name: apk-armeabi-v7a
          path: build/apk/*armeabi*.apk
          if-no-files-found: warn

      - name: Upload APK (x86_64) — للمحاكي
        uses: actions/upload-artifact@v4
        with:
          name: apk-x86_64
          path: build/apk/*x86_64*.apk
          if-no-files-found: warn

      # ── رفع كل الـ APKs في ملف واحد أيضاً ────
      - name: Upload all APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-all
          path: build/apk/
          if-no-files-found: warn


  # ════════════════════════════════════════════
  #  AAB — لنشر على Google Play Store
  #  Google Play تُنشئ APK مخصص لكل هاتف تلقائياً
  # ════════════════════════════════════════════
  build-aab:
    name: Build AAB (Google Play)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Flutter doctor
        run: flutter doctor

      - name: Build AAB
        run: |
          flutter config --no-analytics
          flet build aab \
            --build-number=$BUILD_NUMBER \
            --build-version=$BUILD_VERSION \
            --verbose

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-release
          path: build/aab/
          if-no-files-found: warn
