[project]
name = "alqarib"
version = "1.0.0"
dependencies = [
    "flet",
    "flet-ads",
]

[tool.flet]
org = "com.alqarib"

[tool.flet.android]
signing_key_store = "alqarib.jks"
signing_key_store_password = "$(KEYSTORE_PASSWORD)"
signing_key_alias = "$(KEY_ALIAS)"
signing_key_password = "$(KEY_PASSWORD)"

[tool.flet.android.meta_data]
"com.google.android.gms.ads.APPLICATION_ID" = "ca-app-pub-9178517854331057~2091373767"

[tool.flet.ios.info]
GADApplicationIdentifier = "ca-app-pub-9178517854331057~2091373767"
