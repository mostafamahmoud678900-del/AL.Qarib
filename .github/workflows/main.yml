name: Android Build (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.12.2
  FLUTTER_VERSION: 3.41.4

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 📥 تحميل الكود
      # ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 🐍 Python
      # ─────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ─────────────────────────────────────────
      # 🟦 Flutter
      # ─────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # ─────────────────────────────────────────
      # ☕ Java
      # ─────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ─────────────────────────────────────────
      # 📜 قبول رخص Android SDK
      # ─────────────────────────────────────────
      - name: Accept Android Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ─────────────────────────────────────────
      # 🔐 إعداد الـ Keystore
      #
      # المشكلة: flet build بيبني في مجلد مؤقت:
      #   build/flutter/android/app/android/app/
      # وبيدور على الـ keystore بـ path نسبي من جوّاه.
      #
      # الحل: نحط الـ keystore في جذر المشروع
      # ونستخدم path نسبي صح يوصّله من مكان البناء.
      # ─────────────────────────────────────────
      - name: Setup Keystore
        run: |
          # الـ keystore في جذر المشروع
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/alqarib.jks

          # تحقق من وجوده
          ls -lh $GITHUB_WORKSPACE/alqarib.jks

      # ─────────────────────────────────────────
      # 🛠️ Build APK — التوقيع بـ absolute path
      # ─────────────────────────────────────────
      - name: Build APK (Release + Signed)
        run: |
          flutter config --no-analytics
          flet build apk \
            --build-number=${{ env.BUILD_NUMBER }} \
            --build-version=${{ env.BUILD_VERSION }} \
            --android-signing-key-store=$GITHUB_WORKSPACE/alqarib.jks \
            --android-signing-key-store-password=${{ secrets.KEY_STORE_PASSWORD }} \
            --android-signing-key-alias=${{ secrets.KEY_ALIAS }} \
            --android-signing-key-password=${{ secrets.KEY_PASSWORD }}

      # ─────────────────────────────────────────
      # 📦 Build AAB — التوقيع بـ absolute path
      # ─────────────────────────────────────────
      - name: Build AAB (Release + Signed)
        run: |
          flet build aab \
            --build-number=${{ env.BUILD_NUMBER }} \
            --build-version=${{ env.BUILD_VERSION }} \
            --android-signing-key-store=$GITHUB_WORKSPACE/alqarib.jks \
            --android-signing-key-store-password=${{ secrets.KEY_STORE_PASSWORD }} \
            --android-signing-key-alias=${{ secrets.KEY_ALIAS }} \
            --android-signing-key-password=${{ secrets.KEY_PASSWORD }}

      # ─────────────────────────────────────────
      # 🔍 تحديد مكان الملفات المبنية
      # ─────────────────────────────────────────
      - name: Find build outputs
        run: |
          echo "=== APK files ==="
          find $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null
          echo "=== AAB files ==="
          find $GITHUB_WORKSPACE -name "*.aab" 2>/dev/null

      # ─────────────────────────────────────────
      # 📤 رفع APK
      # ─────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: "**/*.apk"
          if-no-files-found: warn

      # ─────────────────────────────────────────
      # 📤 رفع AAB
      # ─────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: "**/*.aab"
          if-no-files-found: warn

      # ─────────────────────────────────────────
      # 🗑️ تنظيف — حذف الـ keystore
      # ─────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: rm -f $GITHUB_WORKSPACE/alqarib.jks
